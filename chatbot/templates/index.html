<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="content-language" content="en, hi, es, fr, de, ja, zh, ar, pt, ru" />
<title>shwedant — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">sv</div>
        <div>
          <h1>shwedant</h1>
          <p>Your AI assistant</p>
        </div>
      </div>

      <button class="new-chat" id="new-chat-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>

      <nav class="chat-list" id="chat-list" aria-label="Chat history"></nav>

      <div class="sidebar-footer">
        <div class="features">
          <span>📄 PDF · Word · Excel</span>
          <span>🖼️ Image understanding</span>
          <span>🎤 Voice input</span>
        </div>
        <button class="kb-button" id="kb-btn" type="button" title="Knowledge Base">
          📚 Knowledge Base
        </button>
        <button class="theme-toggle" id="theme-toggle" type="button">
          <span id="theme-icon">🌙</span>
          <span id="theme-label">Dark mode</span>
        </button>
      </div>
    </aside>

    <section class="chat-panel">
      <header class="topbar">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle chat list">☰</button>
        <div>
          <h2 id="chat-title">New chat</h2>
          <p id="status-text">Ready</p>
        </div>
        <button class="icon-btn ghost" id="reset-btn" title="Clear this chat" aria-label="Clear this chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>
        </button>
      </header>

      <div id="chat-box" class="chat-box">
        <div class="empty-state" id="empty-state">
          <div class="empty-mark">sv</div>
          <h3>What are we working on?</h3>
          <p>Ask a question, drop in a file, or tap the mic to talk it out.</p>
        </div>
      </div>

      <div id="file-preview" class="file-preview"></div>

      <form id="chat-form" class="composer">
        <label class="icon-btn" title="Attach files" aria-label="Attach files">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05 12.25 20.24a5.5 5.5 0 0 1-7.78-7.78l9.19-9.19a3.67 3.67 0 0 1 5.19 5.19l-9.2 9.19a1.83 1.83 0 0 1-2.59-2.59l8.49-8.48"/></svg>
          <input id="file-input" type="file" multiple accept=".txt,.md,.csv,.pdf,.docx,.xlsx,.xls,.png,.jpg,.jpeg,.webp" hidden />
        </label>
        <textarea id="user-input" placeholder="Message Shwedant..." rows="1" lang="en" spellcheck="true"></textarea>
        <button type="button" id="voice-btn" class="icon-btn" title="Voice input" aria-label="Voice input">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4"/></svg>
        </button>
        <button type="submit" id="send-btn" class="send-btn" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"/></svg>
        </button>
      </form>
      <p class="hint">Up to 5 files per message · 8&nbsp;MB each · Enter to send, Shift+Enter for a new line</p>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" id="hljs-theme" />
  <script src="{{ url_for('static', filename='knowledge-base.js') }}"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
